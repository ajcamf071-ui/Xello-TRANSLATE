<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJC Translate</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Roboto', Arial, sans-serif;
            background: #fff;
            color: #202124;
            padding: 20px;
        }
       .container {
            max-width: 1280px;
            margin: 0 auto;
        }
       .header {
            display: flex;
            align-items: center;
            padding: 12px 0 24px 0;
            border-bottom: 1px solid #e0e0e0;
            margin-bottom: 24px;
        }
       .logo {
            font-size: 22px;
            font-weight: 400;
            color: #5f6368;
        }
       .logo span { color: #1a73e8; font-weight: 500; }
       .translator-box {
            border: 1px solid #dadce0;
            border-radius: 8px;
            overflow: hidden;
        }
       .language-bar {
            display: flex;
            align-items: center;
            border-bottom: 1px solid #dadce0;
            padding: 0 16px;
        }
       .lang-select {
            flex: 1;
            padding: 16px 0;
            border: none;
            font-size: 14px;
            font-weight: 500;
            color: #1a73e8;
            background: transparent;
            cursor: pointer;
            outline: none;
            text-transform: uppercase;
        }
       .swap-btn {
            padding: 12px;
            background: none;
            border: none;
            cursor: pointer;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
       .swap-btn:hover { background: #f1f3f4; }
       .swap-btn svg { width: 20px; height: 20px; fill: #5f6368; }
       .text-areas {
            display: flex;
            min-height: 200px;
        }
       .text-section {
            flex: 1;
            position: relative;
            padding: 20px 24px;
        }
       .text-section:first-child { border-right: 1px solid #dadce0; }
        textarea {
            width: 100%;
            height: 160px;
            border: none;
            outline: none;
            resize: none;
            font-size: 24px;
            font-family: 'Roboto', Arial, sans-serif;
            color: #202124;
            line-height: 32px;
        }
        textarea::placeholder { color: #9aa0a6; }
       .char-count {
            position: absolute;
            bottom: 16px;
            right: 24px;
            font-size: 12px;
            color: #5f6368;
        }
       .translate-btn {
            background: #1a73e8;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            margin: 16px 24px;
            float: right;
        }
       .translate-btn:hover { background: #1557b0; box-shadow: 0 1px 2px rgba(0,0,0,0.3); }
       .translate-btn:disabled { background: #dadce0; cursor: not-allowed; }
       .error {
            background: #fce8e6;
            color: #c5221f;
            padding: 12px 24px;
            font-size: 14px;
            display: none;
        }
       .error.show { display: block; }
       .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #1a73e8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            position: absolute;
            top: 20px;
            right: 24px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
       .loader.show { display: block; }
        @media (max-width: 768px) {
           .text-areas { flex-direction: column; }
           .text-section:first-child { border-right: none; border-bottom: 1px solid #dadce0; }
            textarea { font-size: 18px; height: 120px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo"><span>AJC</span> Translate</div>
        </div>

        <div class="translator-box">
            <div class="language-bar">
                <select id="de" class="lang-select">
                    <option value="español">Español</option>
                    <option value="inglés">Inglés</option>
                    <option value="francés">Francés</option>
                    <option value="portugués">Portugués</option>
                    <option value="alemán">Alemán</option>
                    <option value="italiano">Italiano</option>
                    <option value="japonés">Japonés</option>
                    <option value="chino">Chino</option>
                    <option value="ruso">Ruso</option>
                    <option value="árabe">Árabe</option>
                </select>
                <button class="swap-btn" onclick="swapLanguages()" title="Intercambiar idiomas">
                    <svg viewBox="0 0 24 24"><path d="M6.99 11L3 15l3.99 4v-3H14v-2H6.99v-3zM21 9l-3.99-4v3H10v2h7.01v3L21 9z"></path></svg>
                </button>
                <select id="a" class="lang-select">
                    <option value="inglés">Inglés</option>
                    <option value="español">Español</option>
                    <option value="francés">Francés</option>
                    <option value="portugués">Portugués</option>
                    <option value="alemán">Alemán</option>
                    <option value="italiano">Italiano</option>
                    <option value="japonés">Japonés</option>
                    <option value="chino">Chino</option>
                    <option value="ruso">Ruso</option>
                    <option value="árabe">Árabe</option>
                </select>
            </div>

            <div class="error" id="error"></div>

            <div class="text-areas">
                <div class="text-section">
                    <textarea id="texto" placeholder="Introduce texto" maxlength="5000"></textarea>
                    <div class="char-count"><span id="count">0</span> / 5000</div>
                </div>
                <div class="text-section">
                    <div class="loader" id="loader"></div>
                    <textarea id="resultado" placeholder="Traducción" readonly></textarea>
                </div>
            </div>
            <button class="translate-btn" id="btn" onclick="traducir()">Traducir</button>
        </div>
    </div>

<script>
const GROQ_API_KEY = "";

const texto = document.getElementById('texto');
const resultado = document.getElementById('resultado');
const btn = document.getElementById('btn');
const errorDiv = document.getElementById('error');
const loader = document.getElementById('loader');
const count = document.getElementById('count');

texto.addEventListener('input', () => {
    count.textContent = texto.value.length;
    if (texto.value.trim()) {
        clearTimeout(window.debounceTimer);
        window.debounceTimer = setTimeout(traducir, 800);
    } else {
        resultado.value = '';
    }
});

texto.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' &&!e.shiftKey) {
        e.preventDefault();
        traducir();
    }
});

function swapLanguages() {
    const de = document.getElementById('de');
    const a = document.getElementById('a');
    const temp = de.value;
    de.value = a.value;
    a.value = temp;
    const tempText = texto.value;
    texto.value = resultado.value;
    resultado.value = tempText;
    count.textContent = texto.value.length;
    if (texto.value) traducir();
}

async function traducir() {
    const textoVal = texto.value.trim();
    const de = document.getElementById('de').value;
    const a = document.getElementById('a').value;

    errorDiv.classList.remove('show');

    if (GROQ_API_KEY === "" ||!GROQ_API_KEY.startsWith("gsk_")) {
        showError('configure ur api in line 108');
        return;
    }
    if (!textoVal) {
        resultado.value = '';
        return;
    }

    btn.disabled = true;
    loader.classList.add('show');
    resultado.value = '';

    try {
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: {
                "Authorization": "Bearer " + GROQ_API_KEY,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: "llama-3.3-70b-versatile",
                messages: [{
                    role: "system",
                    content: "Eres un traductor profesional. Traduce el texto del usuario. Responde ÚNICAMENTE con la traducción, sin explicaciones, sin comillas, sin texto adicional."
                },{
                    role: "user",
                    content: `Traduce de ${de} a ${a}: ${textoVal}`
                }],
                temperature: 0.1,
                max_tokens: 3000
            })
        });

        const data = await response.json();

        if (!response.ok) {
            throw new Error(data.error?.message || 'Error');
        }

        resultado.value = data.choices[0].message.content.trim();
    } catch (e) {
        showError(e.message);
    }

    btn.disabled = false;
    loader.classList.remove('show');
}

function showError(msg) {
    errorDiv.textContent = msg;
    errorDiv.classList.add('show');
    setTimeout(() => errorDiv.classList.remove('show'), 5000);
}
</script>
</body>
                                                                              </html>
